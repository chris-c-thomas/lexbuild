# Local Meilisearch for search index builds and dev server.
#
# Runs linux/amd64 Meilisearch so the data directory is binary-compatible
# with the VPS (Linux x86_64). The data directory can be transferred
# directly — no re-indexing needed on the VPS.
#
# Two volume profiles:
#   full  — complete 1M+ doc index (for production builds and VPS transfer)
#   dev   — small subset for local Astro dev server testing
#
# Usage (via deploy script):
#   ./scripts/deploy.sh --search-docker                    # Full reindex
#   ./scripts/deploy.sh --search-docker-seed               # Seed full volume from VPS
#   ./scripts/deploy.sh --search-docker-seed --profile dev # Seed dev volume (small subset)
#
# Start for dev:
#   MEILI_PROFILE=dev docker compose -f docker-compose.meili.yml up -d

services:
  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    platform: linux/amd64
    container_name: lexbuild-meili-${MEILI_PROFILE:-full}
    ports:
      - "7711:7700"
    volumes:
      - meili-data-${MEILI_PROFILE:-full}:/meili_data
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_LOG_LEVEL=WARN

volumes:
  meili-data-full:
  meili-data-dev:
