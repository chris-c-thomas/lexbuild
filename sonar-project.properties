# ------------------------------------------------------------------------------
# Project Metadata
# ------------------------------------------------------------------------------

sonar.projectKey=chris-c-thomas_lexbuild
sonar.projectName=lexbuild

# ------------------------------------------------------------------------------
# Source Configuration
# ------------------------------------------------------------------------------

# Source directories
sonar.sources=packages

# Test files
sonar.tests=packages

# Identify test files
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# ------------------------------------------------------------------------------
# TypeScript / JavaScript Settings
# ------------------------------------------------------------------------------

sonar.language=ts

# Exclude build artifacts
sonar.exclusions=**/dist/**,**/node_modules/**,**/*.d.ts

# ------------------------------------------------------------------------------
# Duplication Detection
# ------------------------------------------------------------------------------

# Exclude test files from copy-paste detection
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts

# ------------------------------------------------------------------------------
# Coverage
# ------------------------------------------------------------------------------

# sonar.javascript.lcov.reportPaths=coverage/lcov.info
